name: Generate Video

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg and ImageMagick
        run: |
          export DEBIAN_FRONTEND=noninteractive
          timeout 120 sudo apt-get update
          timeout 180 sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run video generation (15 min cap, up to 3 attempts)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            if timeout 900 python generate_video.py; then
              echo "Succeeded on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt failed or timed out after 15 minutes."
          done
          echo "All 3 attempts failed. Next scheduled run is in 6 hours."
          exit 1

      - name: Upload generated video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-video-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 7
